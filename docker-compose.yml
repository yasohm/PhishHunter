services:
  postgres:
    image: postgres:15
    container_name: phishguard-db
    environment:
      POSTGRES_DB: phishguard
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d phishguard" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: phishguard-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:admin123@postgres:5432/phishguard
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: phishguard-web
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:15
    container_name: phishhunter-db
    environment:
      POSTGRES_DB: phishhunter
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d phishhunter" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: phishhunter-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:admin123@postgres:5432/phishhunter
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/data/Training Dataset.arff:/app/data/Training Dataset.arff:ro

  frontend:
    build: ./frontend
    container_name: phishhunter-web
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:

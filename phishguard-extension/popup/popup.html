<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PhishGuard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <header>
      <div class="logo">
        <img src="../icons/icon-48.png" width="22" height="22" alt="">
        <span>PhishGuard</span>
      </div>
      <button id="btn-options" title="Paramètres">&#9881;</button>
    </header>

    <!-- Current URL verdict -->
    <section id="current-section">
      <div id="state-loading" class="state">
        <div class="spinner"></div>
        <p>Analyse en cours…</p>
      </div>

      <div id="state-unavailable" class="state hidden">
        <div class="state-icon">&#128274;</div>
        <p>Page non analysable</p>
        <small>Fonctionne uniquement sur les pages HTTP/HTTPS.</small>
      </div>

      <div id="state-error" class="state hidden">
        <div class="state-icon">&#10060;</div>
        <p>API inaccessible</p>
        <small>Vérifiez que le backend PhishGuard tourne.</small>
      </div>

      <div id="state-result" class="hidden">
        <div id="result-url"></div>
        <div id="result-badge-row">
          <span id="result-badge"></span>
          <span id="result-confidence"></span>
        </div>
        <div class="progress-wrap">
          <div id="result-bar" class="progress-bar"></div>
        </div>
      </div>
    </section>

    <!-- Recent scans -->
    <section id="history-section">
      <div class="section-title">Analyses récentes</div>
      <div id="history-list">
        <p class="empty-msg">Aucune analyse pour le moment.</p>
      </div>
    </section>

    <footer>
      <button id="btn-rescan" class="btn-rescan" disabled>Ré-analyser</button>
    </footer>

  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>

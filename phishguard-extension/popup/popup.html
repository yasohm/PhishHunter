<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PhishGuard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <header>
      <div class="logo">
        <img src="../icons/icon-48.png" width="22" height="22" alt="">
        <span>PhishGuard</span>
      </div>
      <button id="btn-options" title="Paramètres">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </header>

    <!-- Current URL verdict -->
    <section id="current-section">
      <div id="state-loading" class="state">
        <div class="spinner"></div>
        <p>Analyse en cours…</p>
      </div>

      <div id="state-unavailable" class="state hidden">
        <div class="state-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <p>Page non analysable</p>
        <small>Fonctionne uniquement sur les pages HTTP/HTTPS.</small>
      </div>

      <div id="state-error" class="state hidden">
        <div class="state-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
        </div>
        <p>API inaccessible</p>
        <small>Vérifiez que le backend PhishGuard tourne.</small>
      </div>

      <div id="state-result" class="hidden">
        <div id="result-url"></div>
        <div id="result-badge-row">
          <span id="result-badge"></span>
          <span id="result-confidence"></span>
        </div>
        <div class="progress-wrap">
          <div id="result-bar" class="progress-bar"></div>
        </div>
      </div>
    </section>

    <!-- Recent scans -->
    <section id="history-section">
      <div class="section-title">Analyses récentes</div>
      <div id="history-list">
        <p class="empty-msg">Aucune analyse pour le moment.</p>
      </div>
    </section>

    <footer>
      <button id="btn-rescan" class="btn-rescan" disabled>Ré-analyser</button>
    </footer>

  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
